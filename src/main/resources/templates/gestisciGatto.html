<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	
	<head>
		<title>Gestisci Gatto</title>
	</head>
	
	<body>
	
		<h1>Gestione Gatto</h1>
		
		<form th:action="@{/admin/aggiornaGatto}" method="POST" th:object="${gatto}" enctype="multipart/form-data">
			
			<input type="hidden" th:field="*{id}"/>
			
			<p>Nome: <input type="text" th:field="*{nome}"/></p>
			<p>Età: <input type="number" th:field="*{eta}"/></p>
			<p>Colore: <input type="text" th:field="*{colore}"/></p>
			
			<p>
				<input type="checkbox" th:field="*{adottato}"/>
				<label>Segna come Adottato</label>
			</p>
			
			<h3>Cartella Clinica</h3>
			<p>
				<input type="checkbox" th:field="*{fiv}"/>
				<label>FIV Positivo</label>
			</p>
			
			<p>
				<input type="checkbox" th:field="*{felv}"/>
				<label>FELV Positivo</label>
			</p>
			
			<p>Vaccini effettuati: <br>
				<input type="text" th:field="*{vaccini}" placeholder="Es: Trivalente, Rabbia..." style="width: 300px;"/>
			</p>
			<p>Problematiche o note mediche: <br>
				<textarea th:field="*{problematiche}" placeholder="Inserisci eventuali terapie o allergie..." rows="4" cols="40"></textarea>
			</p>
			
			<div style="margin-top: 20px; padding: 10px; background-color: #f9fbfa; border: 1px solid #b3d4e0; border-radius: 8px;">
				<label><strong>Aggiorna la foto del gatto (lascia vuoto per mantenere quella attuale):</strong></label><br>
				<input type="file" name="fileFoto" accept="image/png, image/jpeg" style="margin-top: 5px;" />
			</div>
			
			<br>
			<button type="submit" style="padding: 10px 20px; font-weight: bold;">Salva Modifiche</button>
			
		</form>
		
		<hr>
		
		<div style="margin-top: 30px; border: 1px solid red; padding: 10px;">
			<h3>Zona pericolosa</h3>
			<p>Se il gatto è stato trasferito, puoi rimuoverlo dal database.</p>
			<a th:href="@{/admin/eliminaGatto(gattoId=${gatto.id})}" style="color: red; font-weight: bold;">ELIMINA QUESTO GATTO</a>
		</div>
		
		<br>
		<a href="/galleria">Annulla e torna alla galleria</a>
		
	</body>
</html>
