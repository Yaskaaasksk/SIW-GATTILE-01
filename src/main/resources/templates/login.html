<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Accesso Area Riservata</title>
</head>
<body>
    <h1>Accesso</h1>

    <div th:if="${param.errore}" style="color: red; font-weight: bold;">
        Email o password errati! Riprova.
    </div>

    <div th:if="${param.logout}" style="color: green; font-weight: bold;">
        Sei uscito correttamente dal sistema.
    </div>

    <form th:action="@{/login}" method="POST">
        <p>Email: <input type="email" name="email" required /></p>
        <p>Password: <input type="password" name="password" required /></p>
        <button type="submit">Entra</button>
    </form>

    <br>
    <a href="/registrazione">Non hai un account? Registrati qui</a><br><br>
    <a href="/galleria">Torna alla galleria pubblica</a>
</body>
</html>
